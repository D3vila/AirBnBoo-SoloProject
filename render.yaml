services:
  - type: web
    name: airbnboo-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    releaseCommand: cd backend && npm install && npx sequelize-cli db:migrate --url "$DATABASE_URL"
    startCommand: cd backend && npm install && npx sequelize-cli db:migrate --url "$DATABASE_URL" && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MIGRATE_ON_START
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: airbnboo-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 604800
    routes:
      - path: /
        destination: /

  - type: pserv
    name: airbnboo-db
    runtime: postgres
    plan: free
    ipAllowList: []
    postgresMajorVersion: 14
